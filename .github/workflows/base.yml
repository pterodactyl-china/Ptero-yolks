name: build oses
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches:
      - main
    paths:
      - oses/**
jobs:
  push:
    name: "yolks:${{ matrix.oses }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        oses:
          - alpine
          - debian_bookworm
          - debian_trixie
          - ubuntu_24.04
        include:
          - oses: debian_bookworm
            alias_tags: |
              registry.cn-shanghai.aliyuncs.com/pterocn-eggs/yolks:debian
          - oses: ubuntu_24.04
            alias_tags: |
              registry.cn-shanghai.aliyuncs.com/pterocn-eggs/yolks:ubuntu
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./oses/${{ matrix.oses }}
          file: ./oses/${{ matrix.oses }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.cn-shanghai.aliyuncs.com/pterocn-eggs/yolks:${{ matrix.oses }}
            ${{ matrix.alias_tags }}
